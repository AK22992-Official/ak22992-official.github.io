<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akrypt</title>

<!-- Browser Tab Logo -->
<link rel="icon" type="image/png" href="pfp.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

/* ===== RESET ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Space Grotesk',sans-serif;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* ===== ANIMATED BACKGROUND ===== */

.bg{
  position:fixed;
  inset:0;
  z-index:-10;
  overflow:hidden;
}

.grid{
  position:absolute;
  width:200%;
  height:200%;
  background:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:70px 70px;
  transform:rotate(12deg);
  animation:gridMove 12s linear infinite;
}

@keyframes gridMove{
  from{
    transform:translateY(0px) rotate(12deg);
  }
  to{
    transform:translateY(-70px) rotate(12deg);
  }
}

.glow{
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.4;
}

.glow:nth-child(2){
  width:450px;
  height:450px;
  background:#ff9d57;
  top:-150px;
  left:-100px;
}

.glow:nth-child(3){
  width:500px;
  height:500px;
  background:#6d5cff;
  bottom:-180px;
  right:-100px;
}

/* ===== NAVBAR ===== */

nav{
  width:100%;
  position:fixed;
  top:0;
  left:0;
  z-index:999;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 7%;
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:1px;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  transition:0.4s;
}

.logo img:hover{
  transform:rotate(8deg) scale(1.1);
}

.links{
  display:flex;
  gap:25px;
}

.links a{
  text-decoration:none;
  color:#d4d4d4;
  transition:0.3s;
  font-size:0.95rem;
}

.links a:hover{
  color:#ff9d57;
}

/* ===== HERO ===== */

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:120px 8%;
}

.content{
  width:100%;
  max-width:1200px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:70px;
  flex-wrap:wrap;
}

/* LEFT */

.left{
  flex:1;
  min-width:320px;
}

.tag{
  color:#ff9d57;
  font-size:0.9rem;
  letter-spacing:2px;
  margin-bottom:25px;
}

h1{
  font-size:7rem;
  line-height:0.9;
  margin-bottom:25px;
}

.desc{
  color:#aaaaaa;
  font-size:1.05rem;
  line-height:1.9;
  max-width:600px;
}

/* ===== VERTICAL BUTTONS ===== */

.scroll-buttons{
  display:flex;
  flex-direction:column;
  gap:18px;
  margin-top:40px;
  width:260px;
}

.sbtn{
  display:flex;
  align-items:center;
  gap:16px;
  padding:18px 22px;
  border-radius:22px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.06);
  transition:0.35s;
  position:relative;
  overflow:hidden;
}

.sbtn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#ff9d57,#6d5cff);
  opacity:0;
  transition:0.35s;
  z-index:-1;
}

.sbtn:hover::before{
  opacity:1;
}

.sbtn:hover{
  transform:translateX(12px) scale(1.03);
}

.sbtn i{
  font-size:1.3rem;
}

.sbtn span{
  font-size:1rem;
  font-weight:500;
}

/* ===== RIGHT / PFP ===== */

.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.circle{
  position:absolute;
  width:420px;
  height:420px;
  border-radius:50%;
  background:linear-gradient(135deg,#ff9d57,#6d5cff);
  filter:blur(90px);
  opacity:0.25;
  animation:float 5s ease-in-out infinite;
}

@keyframes float{
  0%,100%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-25px);
  }
}

.right img{
  width:350px;
  border-radius:35px;
  position:relative;
  z-index:2;
  box-shadow:0 25px 80px rgba(0,0,0,0.5);
  transition:0.5s ease;
  animation:floatPfp 5s ease-in-out infinite;
}

.right img:hover{
  transform:scale(1.06) rotate(2deg);
  box-shadow:
  0 0 30px rgba(255,157,87,0.5),
  0 0 80px rgba(109,92,255,0.35);
}

@keyframes floatPfp{
  0%,100%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-18px);
  }
}

/* ===== FOOTER ===== */

footer{
  text-align:center;
  padding:30px;
  color:#777;
  font-size:0.9rem;
}

/* ===== MOBILE ===== */

@media(max-width:950px){

  .content{
    flex-direction:column-reverse;
    text-align:center;
  }

  h1{
    font-size:4rem;
  }

  .desc{
    margin:auto;
  }

  .scroll-buttons{
    margin:auto;
    margin-top:35px;
  }

  .right img{
    width:250px;
  }

  .circle{
    width:280px;
    height:280px;
  }

  .links{
    display:none;
  }

}

</style>
</head>

<body>

<!-- ===== BACKGROUND ===== -->

<div class="bg">
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow"></div>
</div>

<!-- ===== NAVBAR ===== -->

<nav>

  <div class="logo">
    <img src="pfp.png" alt="pfp">
    <span>AKRYPT</span>
  </div>

  <div class="links">
    <a href="#">Home</a>
    <a href="#socials">Socials</a>
  </div>

</nav>

<!-- ===== HERO ===== -->

<section class="hero">

  <div class="content">

    <!-- LEFT -->

    <div class="left">

      <div class="tag">
        FUTURISTIC DIGITAL CREATOR
      </div>

      <h1>
        AKRYPT
      </h1>

      <p class="desc">
        Discord Moderator, YouTuber, and Fun Developer creating stylish communities,
        futuristic interfaces, and modern digital experiences.
      </p>

      <!-- BUTTONS -->

      <div class="scroll-buttons" id="socials">

        <a href="https://discord.gg/XubGT25j4S" target="_blank" class="sbtn">
          <i class="fa-brands fa-discord"></i>
          <span>Discord</span>
        </a>

        <a href="https://www.youtube.com/@akryptrbx" target="_blank" class="sbtn">
          <i class="fa-brands fa-youtube"></i>
          <span>YouTube</span>
        </a>

        <div class="sbtn">
          <i class="fa-solid fa-code"></i>
          <span>Developer</span>
        </div>

      </div>

    </div>

    <!-- RIGHT -->

    <div class="right">

      <div class="circle"></div>

      <img src="pfp.png" alt="Akrypt">

    </div>

  </div>

</section>

<!-- ===== FOOTER ===== -->

<footer>
  © 2026 Akrypt • Dynamic UI Portfolio
</footer>

</body>
</html>
